<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 大屏沉默用户识别系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --primary-light: #e8f0fe;
      --success: #00b96b;
      --success-light: #e6f9f0;
      --warning: #fa8c16;
      --warning-light: #fff7e6;
      --danger: #ff4d4f;
      --danger-light: #fff1f0;
      --gray-1: #f5f7fa;
      --gray-2: #e8eaed;
      --gray-3: #bfc4cc;
      --gray-4: #8c9099;
      --gray-5: #4e5969;
      --text: #1d2129;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--gray-1);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: #fff;
      border-right: 1px solid var(--gray-2);
      padding: 20px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-title {
      padding: 0 20px 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-item {
      margin: 0;
    }

    .sidebar-link {
      display: block;
      padding: 10px 20px;
      color: var(--gray-4);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-link:hover {
      background: var(--gray-1);
      color: var(--primary);
    }

    .sidebar-link.active {
      background: var(--primary-light);
      color: var(--primary);
      border-left-color: var(--primary);
    }

    /* ── Main Content ── */
    .main {
      flex: 1;
      margin-left: 240px;
      padding: 20px;
    }

    .header {
      background: #fff;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 24px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--gray-2);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    .form-textarea {
      resize: vertical;
      min-height: 200px;
      font-family: monospace;
    }

    /* ── Button ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: #0958d9;
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-success:hover {
      background: #009a5a;
    }

    .btn-secondary {
      background: var(--gray-2);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--gray-3);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: #d9393f;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Table ── */
    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--gray-1);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--gray-5);
      border-bottom: 1px solid var(--gray-2);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--gray-2);
    }

    tr:hover {
      background: var(--gray-1);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success {
      background: var(--success-light);
      color: var(--success);
    }

    .badge-warning {
      background: var(--warning-light);
      color: var(--warning);
    }

    .badge-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--gray-4);
    }

    /* ── Alert ── */
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .alert-success {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .alert-error {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .alert-info {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--gray-3);
    }

    .modal-footer {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      .main {
        margin-left: 200px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 160px;
      }
      .main {
        margin-left: 160px;
        padding: 12px;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .btn-group {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">菜单</div>
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="#" class="sidebar-link active" onclick="switchTab('dashboard')">📊 仪表板</a>
      </li>
      <li class="sidebar-item">
        <a href="#" class="sidebar-link" onclick="switchTab('import')">📥 导入数据</a>
      </li>
      <li class="sidebar-item">
        <a href="#" class="sidebar-link" onclick="switchTab('export')">📤 导出结果</a>
      </li>
      <li class="sidebar-item">
        <a href="#" class="sidebar-link" onclick="switchTab('records')">📋 查询记录</a>
      </li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Header -->
    <div class="header">
      <div class="header-title">🔐 后台管理</div>
      <div class="header-actions">
        <a href="app.html" class="btn btn-secondary" target="_blank">👤 返回前台</a>
      </div>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboard-tab" class="tab-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalQueries">0</div>
          <div class="stat-label">总查询数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="silentCount">0</div>
          <div class="stat-label">沉默用户数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activatedCount">0</div>
          <div class="stat-label">已促活数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="dbCount">0</div>
          <div class="stat-label">用户库规模</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 数据概览</div>
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>查询数</th>
              <th>沉默用户</th>
              <th>已促活</th>
              <th>促活率</th>
            </tr>
          </thead>
          <tbody id="dashboardTable">
            <tr>
              <td colspan="5" style="text-align:center;color:var(--gray-3);">暂无数据</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Import Tab -->
    <div id="import-tab" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">📥 导入沉默用户表</div>
        <div class="alert alert-info">
          请粘贴 CSV 或 TSV 格式数据，每行一条记录。格式：地市,STBID,是否沉默用户
        </div>
        <div class="form-group">
          <label class="form-label">数据内容</label>
          <textarea class="form-textarea" id="importData" placeholder="长沙,00491300501913102508540A77793D7F,是&#10;长沙,0049130030193130240178465F0B8066,否"></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="importData()">✅ 确认导入</button>
          <button class="btn btn-secondary" onclick="clearImportData()">🗑️ 清空</button>
        </div>
        <div id="importResult"></div>
      </div>
    </div>

    <!-- Export Tab -->
    <div id="export-tab" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">📤 导出结果表</div>
        <div class="form-group">
          <label class="form-label">选择日期</label>
          <input type="date" class="form-input" id="exportDate" />
        </div>
        <div class="btn-group">
          <button class="btn btn-success" onclick="exportResults()">📥 下载 CSV</button>
          <button class="btn btn-secondary" onclick="exportAllResults()">📥 下载全部数据</button>
        </div>
        <div id="exportResult"></div>
      </div>
    </div>

    <!-- Records Tab -->
    <div id="records-tab" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">📋 查询记录</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>STBID</th>
                <th>地市</th>
                <th>状态</th>
                <th>工号</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody id="recordsTable">
              <tr>
                <td colspan="6" style="text-align:center;color:var(--gray-3);">暂无记录</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 数据管理
// ─────────────────────────────────────────────

let silentDB = JSON.parse(localStorage.getItem('silentDB') || '[]') || [
  { city: '长沙', stbid: '00491300501913102508540A77793D7F', silent: true },
  { city: '长沙', stbid: '0049130030193130240178465F0B8066', silent: false },
];

function saveSilentDB() {
  localStorage.setItem('silentDB', JSON.stringify(silentDB));
}

function getAllRecords() {
  const records = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('qh_') || key.startsWith('ar_')) {
      const data = JSON.parse(localStorage.getItem(key));
      records.push(...data);
    }
  }
  return records;
}

// ─────────────────────────────────────────────
// Tab 切换
// ─────────────────────────────────────────────

function switchTab(tab) {
  // 隐藏所有 tab
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  // 显示选中 tab
  document.getElementById(tab + '-tab').style.display = 'block';
  // 更新菜单
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  // 加载数据
  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'records') loadRecords();
}

// ─────────────────────────────────────────────
// Dashboard
// ─────────────────────────────────────────────

function loadDashboard() {
  const allRecords = getAllRecords();
  const queryRecords = allRecords.filter(r => r.type);
  const activationRecords = allRecords.filter(r => r.workId);

  document.getElementById('totalQueries').textContent = queryRecords.length;
  document.getElementById('silentCount').textContent = queryRecords.filter(r => r.type === 'silent').length;
  document.getElementById('activatedCount').textContent = activationRecords.length;
  document.getElementById('dbCount').textContent = silentDB.length;

  // 按日期分组
  const byDate = {};
  queryRecords.forEach(r => {
    const date = new Date(r.ts).toISOString().slice(0, 10);
    if (!byDate[date]) byDate[date] = { queries: 0, silent: 0, activated: 0 };
    byDate[date].queries++;
    if (r.type === 'silent') byDate[date].silent++;
  });

  activationRecords.forEach(r => {
    const date = new Date(r.ts).toISOString().slice(0, 10);
    if (byDate[date]) byDate[date].activated++;
  });

  const tbody = document.getElementById('dashboardTable');
  const rows = Object.entries(byDate).sort((a, b) => b[0].localeCompare(a[0])).map(([date, data]) => {
    const rate = data.silent > 0 ? ((data.activated / data.silent) * 100).toFixed(1) : '0';
    return `
      <tr>
        <td>${date}</td>
        <td>${data.queries}</td>
        <td><span class="badge badge-warning">${data.silent}</span></td>
        <td><span class="badge badge-success">${data.activated}</span></td>
        <td>${rate}%</td>
      </tr>
    `;
  });

  tbody.innerHTML = rows.length > 0 ? rows.join('') : '<tr><td colspan="5" style="text-align:center;color:var(--gray-3);">暂无数据</td></tr>';
}

// ─────────────────────────────────────────────
// Import
// ─────────────────────────────────────────────

function importData() {
  const raw = document.getElementById('importData').value.trim();
  if (!raw) {
    showResult('importResult', '请粘贴数据', 'error');
    return;
  }

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0, skipped = 0;

  lines.forEach(line => {
    const parts = line.split(/[,\t]/).map(p => p.trim());
    if (parts.length < 3) { skipped++; return; }
    const city = parts[0];
    const stbid = parts[1].toUpperCase();
    const silentFlag = parts[2];
    if (!stbid || stbid.length !== 32) { skipped++; return; }
    const silent = silentFlag === '是' || silentFlag.toLowerCase() === 'yes' || silentFlag === '1';
    const idx = silentDB.findIndex(r => r.stbid === stbid);
    if (idx >= 0) silentDB[idx] = { city, stbid, silent };
    else silentDB.push({ city, stbid, silent });
    added++;
  });

  saveSilentDB();
  document.getElementById('importData').value = '';
  showResult('importResult', `导入完成！成功 ${added} 条，跳过 ${skipped} 条`, 'success');
}

function clearImportData() {
  document.getElementById('importData').value = '';
}

// ─────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────

function exportResults() {
  const date = document.getElementById('exportDate').value;
  if (!date) {
    showResult('exportResult', '请选择日期', 'error');
    return;
  }
  downloadCSV(date);
}

function exportAllResults() {
  downloadCSV(null);
}

function downloadCSV(date) {
  const allRecords = getAllRecords();
  const queryRecords = allRecords.filter(r => r.type);
  const activationRecords = allRecords.filter(r => r.workId);

  const rows = queryRecords.map(q => {
    const act = activationRecords.find(a => a.stbid === q.stbid && new Date(a.ts).toISOString().slice(0, 10) === new Date(q.ts).toISOString().slice(0, 10));
    const qDate = new Date(q.ts).toISOString().slice(0, 10);
    if (date && qDate !== date) return null;
    return [
      qDate,
      q.city || '',
      q.stbid,
      q.type === 'silent' ? '是' : (q.type === 'not-silent' ? '否' : '未知'),
      act ? '已促活' : (q.type === 'silent' ? '未促活' : '-'),
      act ? act.workId : '',
      act ? act.time : '',
      q.time,
    ];
  }).filter(Boolean);

  const header = ['日期', '地市', 'STBID', '是否沉默用户', '促活状态', '装维工号', '促活时间', '查询时间'];
  const csv = [header, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `沉默用户促活结果_${date || '全部'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showResult('exportResult', '✅ 文件已下载', 'success');
}

// ─────────────────────────────────────────────
// Records
// ─────────────────────────────────────────────

function loadRecords() {
  const allRecords = getAllRecords();
  const tbody = document.getElementById('recordsTable');
  const rows = allRecords.slice(0, 100).map(r => {
    const date = new Date(r.ts).toISOString().slice(0, 10);
    const status = r.type === 'silent' ? '<span class="badge badge-warning">沉默</span>' : 
                   r.type === 'not-silent' ? '<span class="badge badge-success">正常</span>' : 
                   '<span class="badge badge-danger">未知</span>';
    return `
      <tr>
        <td>${date}</td>
        <td style="font-family:monospace;font-size:12px;">${r.stbid}</td>
        <td>${r.city || '-'}</td>
        <td>${status}</td>
        <td>${r.workId || '-'}</td>
        <td>${r.time || '-'}</td>
      </tr>
    `;
  });
  tbody.innerHTML = rows.length > 0 ? rows.join('') : '<tr><td colspan="6" style="text-align:center;color:var(--gray-3);">暂无记录</td></tr>';
}

// ─────────────────────────────────────────────
// Utils
// ─────────────────────────────────────────────

function showResult(elementId, message, type) {
  const el = document.getElementById(elementId);
  el.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

// 初始化
document.getElementById('exportDate').valueAsDate = new Date();
loadDashboard();
</script>

</body>
</html>
